<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SEBT - Student Expense & Budget Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/variables.css?v=11">
  <link rel="stylesheet" href="css/layout.css?v=11">
  <link rel="stylesheet" href="css/components.css?v=11">
  <link rel="stylesheet" href="css/charts.css?v=11">
</head>
<body>
  <div class="app-container">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <div class="logo-icon">SEBT</div>
        <div class="logo-text">
          <span class="logo-title">SEBT</span>
          <span class="logo-subtitle">Student Expense &<br>Budget Tracker</span>
        </div>
      </div>
      <nav class="sidebar-nav" id="sidebar-nav">
        <a href="#dashboard" class="nav-item active" data-view="dashboard"><i class="bi bi-grid-1x2-fill"></i><span>Dashboard</span></a>
        <a href="#transactions" class="nav-item" data-view="transactions"><i class="bi bi-receipt"></i><span>Transactions</span></a>
        <a href="#budget" class="nav-item" data-view="budget"><i class="bi bi-wallet2"></i><span>Budget</span></a>
        <a href="#goals" class="nav-item" data-view="goals"><i class="bi bi-bullseye"></i><span>Goals</span></a>
        <a href="#debts" class="nav-item" data-view="debts"><i class="bi bi-people-fill"></i><span>Split/Debts</span></a>
        <a href="#analytics" class="nav-item" data-view="analytics"><i class="bi bi-graph-up"></i><span>Analytics</span></a>
        <a href="#categories" class="nav-item" data-view="categories"><i class="bi bi-tags-fill"></i><span>Categories</span></a>
        <a href="#settings" class="nav-item" data-view="settings"><i class="bi bi-gear-fill"></i><span>Settings</span></a>
      </nav>
      <div class="sidebar-user" style="display: flex; align-items: center; justify-content: space-between; width: 100%;">
        <div style="display: flex; align-items: center; gap: 12px;">
          <div class="user-avatar"><i class="bi bi-person-fill"></i></div>
          <div class="user-info">
            <span class="user-name">Hey, User! &#128075;</span>
            <span class="user-role">Student</span>
          </div>
        </div>
        <button class="btn btn-icon" style="color: var(--color-danger); border: 1px solid transparent; padding: 6px;" onclick="SEBT.app.logout()" title="Logout">
          <i class="bi bi-box-arrow-right" style="font-size: 1.1rem"></i>
        </button>
      </div>
    </aside>
    <button class="mobile-toggle" id="mobile-toggle"><i class="bi bi-list"></i></button>
    <main class="main-content" id="main-content"></main>
  </div>
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal-content"></div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="js/data.js?v=15"></script>
  <script src="js/login.js?v=16"></script>
  <script src="js/charts.js?v=11"></script>
  <script src="js/dashboard.js?v=11"></script>
  <script src="js/transactions.js?v=11"></script>
  <script src="js/budget.js?v=11"></script>
  <script src="js/debts.js?v=1"></script>
  <script src="js/goals_final.js?v=11"></script>
  <script src="js/analytics.js?v=11"></script>
  <script src="js/categories.js?v=11"></script>
  <script src="js/settings.js?v=12"></script>
  <script src="js/app.js?v=11"></script>
</body>
</html>
